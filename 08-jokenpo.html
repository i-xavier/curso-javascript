<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>Jokenpô</title>
  <style>
    .pedra, .papel, .tesoura{
      width: 50px;
      height: 50px;
      background-color: black;
    }

    #jogador, #computador{
      width: 50px;
      height: 50px;
      
    }

    #resultado{
      font-size: 20px;
      font-weight: bold;
    }

    #vitorias, #derrotas, #empates{
      margin-right: 15px;
    }

    p, a{
      color: white;
    }

    body{
      background-color: black;
    }

    .btn_pedra, .btn_papel, .btn_tesoura{
      background-color: black;
      border-radius: 100px;
      border-width: 3px;
      border-color: white;
      padding: 30px;
      cursor: pointer;
      margin-bottom: 50px;
    }

    .resultados{
      margin-top: 50px;
    }

    .reset{
      display:block;
    }
  </style>
</head>

<body>
  <p>
    Jokenpô
  </p>

  <button class="btn_pedra" onclick="analisarJokenpo(0), tornarVisivel()">
    <img class="pedra" src="imagens\07-jokenpo\rock-emoji.png" >
  </button>

  <button class="btn_papel"  onclick="analisarJokenpo(1), tornarVisivel()">
    <img class="papel" src="imagens\07-jokenpo\paper-emoji.png">

  </button>

  <button class="btn_tesoura" onclick="analisarJokenpo(2), tornarVisivel()">
    <img class="tesoura" src="imagens\07-jokenpo\scissors-emoji.png">
  </button>

  <div id="jogos" style="display:none">
    <p id="resultado"></p>
    
    <a>Você</a>
    
    <img id="jogador" src="" alt="">
    
    <img id="computador" src="" alt="">
    
    <a>Computador</a>

  </div>

  <p class="resultados">Vitórias: <a id="vitorias">0</a>
    Derrotas: <a id="derrotas">0</a>
    Empates: <a id="empates">0</a></p>
  
  

  <button class="reset" onclick="resetarScore()">Reset</button>*

  <script>

    
    const max = 3;
    let randomNum = '';

    let movimentoComputador = new Image(), movimentoJogador = new Image();

    let score;
    
    score = JSON.parse(localStorage.getItem('score')) ||(score = {
      wins: 0,
      losses: 0,
      ties: 0
    });

    /*
    if(!score){
      score = {
        wins: 0,
        losses: 0,
        ties: 0
    }
    }
    */
    

    function jogarJokenpo(escolhaJogador) {
      
      randomNum = Math.floor(Math.random() * max);

      //console.log(randomNum);

      if(randomNum === 0) {

        movimentoComputador = "imagens/07-jokenpo/rock-emoji.png";

      } else if(randomNum === 1) {

        movimentoComputador = "imagens/07-jokenpo/paper-emoji.png";

      } else if(randomNum === 2) {

        movimentoComputador = "imagens/07-jokenpo/scissors-emoji.png";

      }

      if(escolhaJogador === 0) {

      movimentoJogador = "imagens/07-jokenpo/rock-emoji.png";

      } else if(escolhaJogador === 1) {

       movimentoJogador = "imagens/07-jokenpo/paper-emoji.png";

      } else if(escolhaJogador === 2) {

       movimentoJogador = "imagens/07-jokenpo/scissors-emoji.png";

      }

      document.getElementById("jogador").src = movimentoJogador;
      document.getElementById("computador").src = movimentoComputador;
    }

    function analisarJokenpo(escolha){

      jogarJokenpo(escolha);

      

      if ((escolha === 0 && randomNum === 1) || (escolha === 1 && randomNum === 2) || (escolha === 2 && randomNum === 0)){

        //alert("Você perdeu!\nMovimento do computador: " + movimentoComputador);
        score.losses++;
        document.getElementById("derrotas").textContent = score.losses;
        document.getElementById("resultado").textContent = "Você Perdeu";

      } else if((escolha === 1 && randomNum === 0) || (escolha === 2 && randomNum === 1) || (escolha === 0 && randomNum === 2)) {

        //alert("Você ganhou!\nMovimento do computador: " + movimentoComputador);
        score.wins++;
        document.getElementById("vitorias").textContent = score.wins;
        document.getElementById("resultado").textContent = "Você ganhou";

      } else if(escolha === randomNum) {

        //alert("Empate!\nMovimento do computador: " + movimentoComputador);
        score.ties++;
        document.getElementById("empates").textContent = score.ties;
       document.getElementById("resultado").textContent = "Você Empatou"

      }

      localStorage.setItem('score', JSON.stringify(score));

      console.log(score);

    }

    function tornarVisivel(){
      let display = document.getElementById("jogos");
      display.style.display = "block";
    }

    function resetarScore(){

      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      
      localStorage.removeItem('score');

      document.getElementById("derrotas").textContent = score.losses;
      document.getElementById("empates").textContent = score.ties;
      document.getElementById("vitorias").textContent = score.wins;

      console.log(score);

    }
